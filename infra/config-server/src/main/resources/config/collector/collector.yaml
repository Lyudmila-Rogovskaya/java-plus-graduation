spring:
  application:
    name: collector
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server
      fail-fast: true
      retry:
        max-attempts: 15
        initial-interval: 2000
        multiplier: 1.5
        max-interval: 10000

grpc:
  server:
    port: 0

kafka:
  bootstrap-servers: kafka:29092
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: ru.practicum.collector.serialization.UserActionAvroSerializer
    acks: all
    retries: 3
    max-in-flight-requests-per-connection: 1
  topics:
    user-actions: stats.user-actions.v1

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true
    metadata-map:
      gRPC:
        port: ${grpc.server.port}

logging:
  level:
    ru.practicum.collector: INFO
