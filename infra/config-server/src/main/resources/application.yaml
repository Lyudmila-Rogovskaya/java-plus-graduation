  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          searchLocations:
            - classpath:/config/main-service/
            - classpath:/config/stats-server/

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
