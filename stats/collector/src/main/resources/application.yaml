spring:
  application:
    name: collector
  config:
    import: "optional:configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        serviceId: config-server
      fail-fast: true
      retry:
        maxAttempts: 15
        initialInterval: 2000
        multiplier: 1.5
        maxInterval: 10000

grpc:
  server:
    port: 0

kafka:
  bootstrap-servers: kafka:29092
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: ru.practicum.collector.serialization.UserActionAvroSerializer
  topics:
    user-actions: stats.user-actions.v1

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true
    metadata-map:
      gRPC:
        port: ${grpc.server.port}

logging:
  level:
    ru.practicum.collector: INFO
