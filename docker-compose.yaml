services:
  discovery-server:
    build: ./infra/discovery-server
    ports:
      - "8761:8761"
    networks:
      - ewm-network

  stats-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    networks:
      - ewm-network

  stats-server:
    build: ./stats/stats-server
    environment:
      - SERVER_PORT=9090
    ports:
      - "9090:9090"
    depends_on:
      - stats-db
    networks:
      - ewm-network

  ewm-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    networks:
      - ewm-network

  ewm-service:
    build: ./core/main-service
    environment:
      - STAT_SERVER_URL=http://stats-server:9090
    ports:
      - "8080:8080"
    depends_on:
      - ewm-db
      - stats-server
    networks:
      - ewm-network

networks:
  ewm-network:
    driver: bridge
