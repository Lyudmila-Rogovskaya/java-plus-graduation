services:
  discovery-server:
    build: ./infra/discovery-server
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ewm-network

  config-server:
    build: ./infra/config-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
#    healthcheck:
#      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
#      interval: 10s
#      timeout: 5s
#      retries: 5
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - ewm-network

  stats-server:
    build: ./stats/stats-server
    environment:
#      - SERVER_PORT=9090
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      stats-db:
        condition: service_started
      discovery-server:
        condition: service_healthy
    networks:
      - ewm-network

  ewm-service:
    build: ./core/main-service
    environment:
#      - STAT_SERVER_URL=http://stats-server:9090
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
#      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
    depends_on:
      ewm-db:
        condition: service_started
      stats-server:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      - ewm-network

  gateway-server:
    build: ./infra/gateway-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
#      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      - ewm-network

  ewm-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    networks:
      - ewm-network

  stats-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    networks:
      - ewm-network

networks:
  ewm-network:
    driver: bridge
