spring:
  application:
    name: main-service
  config:
    import: "optional:configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        serviceId: config-server
      fail-fast: true
      retry:
        maxAttempts: 3
        initialInterval: 3000
        multiplier: 1.1
        maxInterval: 6000

server:
  port: 0

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:ewm-local
    driverClassName: org.h2.Driver
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      schema-locations: classpath:schema-h2.sql
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 0

stat-server:
  url: http://localhost:9090

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    ru.practicum: TRACE
    org.springframework: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
