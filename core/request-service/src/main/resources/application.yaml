spring:
  application:
    name: request-service
  config:
    import: "optional:configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        serviceId: config-server
      fail-fast: true
      retry:
        maxAttempts: 15
        initialInterval: 2000
        multiplier: 1.5
        maxInterval: 10000

server:
  port: 0

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
